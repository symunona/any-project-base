[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "env(SITE_URL)"
additional_redirect_urls = [
  "http://localhost:5173",
  "http://localhost:5174",
  "http://localhost:5175",
  "http://any-project-base.localhost",
  "http://portal.any-project-base.localhost",
  "http://admin.any-project-base.localhost",
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
minimum_password_length = 8

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false  # disable in local dev

[auth.sms]
enable_signup = false

[[auth.mfa.totp]]
enroll_enabled = false
verify_enabled = false

[analytics]
enabled = false

[functions.dev-login]
verify_jwt = false
